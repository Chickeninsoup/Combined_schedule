<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
  <link rel="stylesheet" href="leaflet.min.css"/>
  <script src="leaflet.min.js"></script>
  <style>
    * { margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; }
    #map { position: absolute; inset: 0; background: #e8e0d8; }
    .tap-hint {
      position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.55); color: #fff; font-size: 11px;
      padding: 3px 10px; border-radius: 12px; pointer-events: none;
      z-index: 999; font-family: sans-serif; white-space: nowrap;
    }
  </style>
</head>
<body>
<div id="map"></div>
<div class="tap-hint">Tap to save a place</div>
<script>
  var map = L.map('map', { zoomControl: false, attributionControl: false })
             .setView([40.1020, -88.2272], 15);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19
  }).addTo(map);

  var layers = [];

  function clearMarkers() {
    layers.forEach(function(l) { map.removeLayer(l); });
    layers = [];
  }

  function setConfig(cfgOrStr) {
    var cfg = (typeof cfgOrStr === 'string') ? JSON.parse(cfgOrStr) : cfgOrStr;
    map.invalidateSize();
    map.setView([cfg.centerLat, cfg.centerLng], 15);
    clearMarkers();

    if (cfg.userLat && cfg.userLng) {
      var u = L.circleMarker([cfg.userLat, cfg.userLng], {
        radius: 9, fillColor: '#4285F4', color: '#fff', weight: 2.5, fillOpacity: 1
      }).bindPopup('<b>You are here</b>');
      u.addTo(map); layers.push(u);
    }

    (cfg.stops || []).forEach(function(s) {
      var m = L.circleMarker([s.lat, s.lng], {
        radius: 10, fillColor: '#E65100', color: '#fff', weight: 2, fillOpacity: 0.9
      }).bindPopup('<b>' + s.name + '</b><br><small>Bus stop</small>');
      m.addTo(map); layers.push(m);
    });

    (cfg.places || []).forEach(function(p) {
      var m = L.circleMarker([p.lat, p.lng], {
        radius: 9, fillColor: '#2E7D32', color: '#fff', weight: 2, fillOpacity: 0.9
      }).bindPopup('<b>' + p.name + '</b><br><small>Saved place</small>');
      m.addTo(map); layers.push(m);
    });
  }

  map.on('click', function(e) {
    if (typeof Android !== 'undefined') {
      Android.onMapTap(e.latlng.lat, e.latlng.lng);
    }
  });
</script>
</body>
</html>
